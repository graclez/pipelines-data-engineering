name: "tpfinal_dbt"
version: "1.0"
config-version: 2

profile: "tpfinal_dbt"

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  tpfinal_dbt:
    staging:
      +materialized: view
      +schema: staging

    marts:
      kimball:
        +materialized: table
        +schema: marts_kimball

      obt:
        +materialized: table
        +schema: marts_obt